name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; newer pushes supersede older runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  indexnow:
    name: Submit to IndexNow
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Ping IndexNow
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
          INDEXNOW_KEY: dc7e97bcf6a14edea77efc1983e3e751
        run: |
          set -euo pipefail
          HOST="$(printf '%s' "$PAGE_URL" | sed -E 's#https?://([^/]+)/?.*#\1#')"
          [ -n "$HOST" ] || HOST="jmrplens.github.io"
          url_json="$(printf '"https://%s/","https://%s/gitlab-mcp-server/","https://%s/cs-routeros-bouncer/"' "$HOST" "$HOST" "$HOST")"
          body="$(printf '{"host":"%s","key":"%s","keyLocation":"https://%s/%s.txt","urlList":[%s]}' \
            "$HOST" "$INDEXNOW_KEY" "$HOST" "$INDEXNOW_KEY" "$url_json")"
          code="$(curl -s -o /dev/null -w '%{http_code}' \
            -H 'Content-Type: application/json; charset=utf-8' \
            -d "$body" 'https://api.indexnow.org/indexnow' || true)"
          case "$code" in
            200|202) echo "IndexNow accepted (HTTP $code)";;
            *) echo "::warning::IndexNow returned HTTP $code (non-fatal)";;
          esac
